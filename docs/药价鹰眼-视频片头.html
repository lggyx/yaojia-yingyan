<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>药价鹰眼 — 视频片头</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0b1714;
    color: #eef5f1;
    font-family: 'Noto Sans SC', system-ui, sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6vw;
    text-align: center;
  }

  /* 背景光晕 */
  .glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
    pointer-events: none;
  }
  .glow-top {
    width: 60vw; height: 60vw;
    background: #1a6b4a;
    top: -20%; left: 20%;
    animation: breathe 8s ease-in-out infinite;
  }
  .glow-bottom {
    width: 50vw; height: 50vw;
    background: #0d4a3a;
    bottom: -15%; right: 10%;
    animation: breathe 8s ease-in-out 4s infinite;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.12; }
    50% { transform: scale(1.15); opacity: 0.18; }
  }

  /* 网格线 */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* 文字淡入动画 */
  .line {
    opacity: 0;
    transform: translateY(24px);
    animation: fadeUp 1s ease-out forwards;
  }
  .line-1 { animation-delay: 0.3s; }
  .line-2 { animation-delay: 0.8s; }
  .line-3 { animation-delay: 1.5s; }
  .line-5 { animation-delay: 2.8s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-size: clamp(12px, 1.2vw, 15px);
    font-weight: 400;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: #5ea884;
    margin-bottom: 2.5vh;
  }

  .title {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(42px, 7vw, 96px);
    font-weight: 900;
    letter-spacing: 0.04em;
    color: #ebf7f0;
    margin-bottom: 3vh;
    position: relative;
  }

  .title::after {
    content: '';
    position: absolute;
    bottom: -0.15em;
    left: 50%;
    transform: translateX(-50%);
    width: 1.6em;
    height: 2px;
    background: linear-gradient(90deg, transparent, #5ea884, transparent);
  }

  /* 数据展示区 */
  .data-row {
    display: flex;
    gap: clamp(24px, 4vw, 56px);
    margin-bottom: 6vh;
    opacity: 0;
    transform: translateY(24px);
    animation: fadeUp 1s ease-out 2.2s forwards;
  }

  .data-item {
    text-align: center;
  }

  .data-value {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 900;
    color: #ebf7f0;
    line-height: 1;
  }

  .data-value.risk { color: #e8734a; }

  .data-label {
    font-size: clamp(11px, 1vw, 14px);
    color: #5ea884;
    letter-spacing: 0.1em;
    margin-top: 0.8vh;
    font-weight: 400;
  }

  .data-pct {
    font-size: clamp(14px, 1.6vw, 22px);
    font-weight: 600;
    color: #8cb8a2;
    letter-spacing: 0.04em;
    margin-top: 4vh;
    max-width: 520px;
    line-height: 1.6;
  }

  .opening {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(18px, 2.2vw, 30px);
    font-weight: 600;
    color: #d4ede2;
    line-height: 2;
    max-width: 780px;
    letter-spacing: 0.02em;
  }

  .opening em {
    font-style: normal;
    color: #e8734a;
  }

  .tag {
    font-size: clamp(11px, 1vw, 13px);
    font-weight: 400;
    letter-spacing: 0.2em;
    color: #4a7a64;
    margin-top: 6vh;
    text-transform: uppercase;
  }

  @media (max-width: 640px) {
    .scene { padding: 8vw; }
    .opening { line-height: 1.8; }
  }
</style>
</head>
<body>

<div class="scene">
  <div class="glow glow-top"></div>
  <div class="glow glow-bottom"></div>
  <div class="grid"></div>

  <p class="eyebrow line line-1">医保价格治理智能监测系统</p>

  <h1 class="title line line-2">药价鹰眼</h1>

  <p class="subtitle line line-3">
    规则可复现　·　证据可追溯　·　结论可反驳　·　处置可闭环
  </p>

  <div class="data-row">
    <div class="data-item">
      <div class="data-value">6</div>
      <div class="data-label">监测记录</div>
    </div>
    <div class="data-item">
      <div class="data-value risk">5</div>
      <div class="data-label">异常候选</div>
    </div>
    <div class="data-item">
      <div class="data-value risk">2</div>
      <div class="data-label">高风险</div>
    </div>
    <div class="data-item">
      <div class="data-value">33%</div>
      <div class="data-label">闭环率</div>
    </div>
  </div>

  <p class="data-pct">
    发现 → 取证 → 校验 → 研判 → 工单 → 复核 → 闭环<br>
    一条完整链路，让每一分钱都<em>有据可查</em>。
  </p>

  <p class="tag line line-5">PRICE SENTINEL</p>
</div>

</body>
</html>
